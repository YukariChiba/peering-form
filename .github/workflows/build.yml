name: Build and Release Typst

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

jobs:
  gen-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: |
          export file=$(ls forms | grep '.typ$' | sed 's/.typ$//g' | jq -R -s -c 'split("\n")[:-1]')
          matrix=$(jq -c -n --argjson file "$file" '{"file": $file}')
          echo "::set-output name=matrix::$matrix"

  build_typst_documents:
    runs-on: ubuntu-latest
    needs: gen-matrix
    strategy:
      matrix: ${{fromJson(needs.gen-matrix.outputs.matrix)}}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Disable Preview for Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          sed -i 's/#let preview = true/#let preview = false/g' variable.typ
          grep "#let preview" variable.typ

      - name: Download Fonts
        run: |
          mkdir fonts /tmp/ibm-plex-sans
          wget https://github.com/IBM/plex/releases/download/%40ibm%2Fplex-sans%401.1.0/ibm-plex-sans.zip -O /tmp/fonts.zip
          unzip /tmp/fonts.zip -d /tmp
          mv /tmp/ibm-plex-sans/fonts/complete/ttf/*.ttf fonts/

      - name: Build Typst (${{ matrix.file }})
        uses: lvignoli/typst-action@main
        with:
          source_file: forms/${{ matrix.file }}.typ
          options: |
            --font-path
            fonts
            --root
            .

      - name: Upload artifact (${{ matrix.file }})
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.file }}.pdf
          path: "forms/${{ matrix.file }}.pdf"
          archive: false

  create_prerelease:
    runs-on: ubuntu-latest
    needs: build_typst_documents
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: "*.pdf"
          path: files
          merge-multiple: true
      - name: Create Pre-release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: files/*.pdf
          prerelease: true
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
